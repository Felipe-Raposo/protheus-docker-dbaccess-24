[General]
LicenseServer=license-server
LicensePort=5555
ODBC30=1
MaxStringSize=500
UseLargeRecno=1

[POSTGRES]
environments=protheus
clientlibrary=/usr/lib64/libodbc.so
CodePage=WIN1252

[MSSQL]
environments=protheus
clientlibrary=/usr/lib64/libodbc.so
compression=2

[POSTGRES/protheus]
ConnectionMode=2
ConnectionString="DRIVER={PostgreSQL ANSI};SERVER=postgresql;PORT=5432;DATABASE={{PROTHEUS_DB}};Uid={{PROTHEUS_USER}};Pwd={{PROTHEUS_PASSWORD}};sslmode=require"

[MSSQL/protheus]
ConnectionMode=2
ConnectionString="DRIVER={ODBC Driver 18 for SQL Server};SERVER=mssql;PORT=1433;DATABASE={{PROTHEUS_DB}};Uid={{PROTHEUS_USER}};Pwd={{PROTHEUS_PASSWORD}};TrustServerCertificate=yes"
IndexSpace=SECONDARY
